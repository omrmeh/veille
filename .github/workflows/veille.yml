name: Veille quotidienne

on:
  schedule:
    - cron: "0 11 * * *" # Tous les jours à 1Oh UTC
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  veille:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la veille
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python veille.py

      - name: Commit et push du HTML
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Veille $(date +'%Y-%m-%d')"
          git push
